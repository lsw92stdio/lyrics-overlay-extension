<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #333; display: flex; gap: 32px; align-items: flex-end; padding: 40px; font-family: sans-serif; color: #fff; }
  .item { text-align: center; }
  img { display: block; image-rendering: pixelated; }
  p { margin: 8px 0 0; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
  <div class="item">
    <img src="icon16.png" width="16" height="16">
    <p>16px (actual)</p>
  </div>
  <div class="item">
    <img src="icon16.png" width="48" height="48">
    <p>16px (3×)</p>
  </div>
  <div class="item">
    <img src="icon48.png" width="48" height="48">
    <p>48px (actual)</p>
  </div>
  <div class="item">
    <img src="icon128.png" width="128" height="128">
    <p>128px (actual)</p>
  </div>
</body>
</html>
